apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaccination-record
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: vaccination-record
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: occupational-health
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: vaccination-record } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: vaccination-record, talentbridge.io/domain: occupational-health }
    spec:
      serviceAccountName: vaccination-record
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: vaccination-record
          image: harbor.talentbridge.internal/talentbridge/vaccination-record:latest
          ports: [{ containerPort: 50283, name: http }]
          envFrom: [{ configMapRef: { name: vaccination-record } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50283 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50283 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
