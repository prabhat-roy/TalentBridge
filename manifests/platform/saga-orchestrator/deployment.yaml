apiVersion: apps/v1
kind: Deployment
metadata:
  name: saga-orchestrator
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: saga-orchestrator
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: platform
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: saga-orchestrator } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: saga-orchestrator, talentbridge.io/domain: platform }
    spec:
      serviceAccountName: saga-orchestrator
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: saga-orchestrator
          image: harbor.talentbridge.internal/talentbridge/saga-orchestrator:latest
          ports: [{ containerPort: 51001, name: http }]
          envFrom: [{ configMapRef: { name: saga-orchestrator } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 51001 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 51001 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
