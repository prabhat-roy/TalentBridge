apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-relay
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: outbox-relay
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: platform
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: outbox-relay } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: outbox-relay, talentbridge.io/domain: platform }
    spec:
      serviceAccountName: outbox-relay
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: outbox-relay
          image: harbor.talentbridge.internal/talentbridge/outbox-relay:latest
          ports: [{ containerPort: 51002, name: http }]
          envFrom: [{ configMapRef: { name: outbox-relay } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 51002 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 51002 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
