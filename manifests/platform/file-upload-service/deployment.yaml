apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-upload-service
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: file-upload-service
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: platform
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: file-upload-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: file-upload-service, talentbridge.io/domain: platform }
    spec:
      serviceAccountName: file-upload-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: file-upload-service
          image: harbor.talentbridge.internal/talentbridge/file-upload-service:latest
          ports: [{ containerPort: 51011, name: http }]
          envFrom: [{ configMapRef: { name: file-upload-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 51011 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 51011 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
