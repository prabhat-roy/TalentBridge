apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-posting
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: job-posting
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: recruitment
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: job-posting } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: job-posting, talentbridge.io/domain: recruitment }
    spec:
      serviceAccountName: job-posting
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: job-posting
          image: harbor.talentbridge.internal/talentbridge/job-posting:latest
          ports: [{ containerPort: 50060, name: http }]
          envFrom: [{ configMapRef: { name: job-posting } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50060 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50060 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
