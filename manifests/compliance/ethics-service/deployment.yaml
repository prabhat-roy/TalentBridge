apiVersion: apps/v1
kind: Deployment
metadata:
  name: ethics-service
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: ethics-service
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: compliance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: ethics-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ethics-service, talentbridge.io/domain: compliance }
    spec:
      serviceAccountName: ethics-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: ethics-service
          image: harbor.talentbridge.internal/talentbridge/ethics-service:latest
          ports: [{ containerPort: 50264, name: http }]
          envFrom: [{ configMapRef: { name: ethics-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50264 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50264 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
