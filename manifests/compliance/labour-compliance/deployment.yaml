apiVersion: apps/v1
kind: Deployment
metadata:
  name: labour-compliance
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: labour-compliance
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: compliance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: labour-compliance } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: labour-compliance, talentbridge.io/domain: compliance }
    spec:
      serviceAccountName: labour-compliance
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: labour-compliance
          image: harbor.talentbridge.internal/talentbridge/labour-compliance:latest
          ports: [{ containerPort: 50260, name: http }]
          envFrom: [{ configMapRef: { name: labour-compliance } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50260 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50260 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
