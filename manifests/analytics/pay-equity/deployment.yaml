apiVersion: apps/v1
kind: Deployment
metadata:
  name: pay-equity
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: pay-equity
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: pay-equity } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: pay-equity, talentbridge.io/domain: analytics }
    spec:
      serviceAccountName: pay-equity
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: pay-equity
          image: harbor.talentbridge.internal/talentbridge/pay-equity:latest
          ports: [{ containerPort: 50303, name: http }]
          envFrom: [{ configMapRef: { name: pay-equity } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50303 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50303 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
