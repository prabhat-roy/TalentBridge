apiVersion: apps/v1
kind: Deployment
metadata:
  name: attrition-predictor
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: attrition-predictor
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: attrition-predictor } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: attrition-predictor, talentbridge.io/domain: analytics }
    spec:
      serviceAccountName: attrition-predictor
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: attrition-predictor
          image: harbor.talentbridge.internal/talentbridge/attrition-predictor:latest
          ports: [{ containerPort: 50301, name: http }]
          envFrom: [{ configMapRef: { name: attrition-predictor } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50301 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50301 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
