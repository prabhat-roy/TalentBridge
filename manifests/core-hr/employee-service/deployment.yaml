apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-service
  namespace: talentbridge-core-hr
  labels:
    app.kubernetes.io/name: employee-service
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: core-hr
    talentbridge.io/data-class: employee-pii
spec:
  replicas: 3
  selector: { matchLabels: { app.kubernetes.io/name: employee-service } }
  template:
    metadata: { labels: { app.kubernetes.io/name: employee-service, talentbridge.io/data-class: employee-pii, talentbridge.io/domain: core-hr } }
    spec:
      serviceAccountName: employee-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: employee-service
          image: harbor.talentbridge.internal/talentbridge/employee-service:latest
          ports: [{ containerPort: 50200, name: http }]
          envFrom: [{ configMapRef: { name: employee-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50200 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50200 }, initialDelaySeconds: 5 }
          resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1500m, memory: 768Mi } }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
