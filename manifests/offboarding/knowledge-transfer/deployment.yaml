apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-transfer
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: knowledge-transfer
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: offboarding
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: knowledge-transfer } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: knowledge-transfer, talentbridge.io/domain: offboarding }
    spec:
      serviceAccountName: knowledge-transfer
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: knowledge-transfer
          image: harbor.talentbridge.internal/talentbridge/knowledge-transfer:latest
          ports: [{ containerPort: 50242, name: http }]
          envFrom: [{ configMapRef: { name: knowledge-transfer } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50242 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50242 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
