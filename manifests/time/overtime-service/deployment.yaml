apiVersion: apps/v1
kind: Deployment
metadata:
  name: overtime-service
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: overtime-service
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: time
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: overtime-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: overtime-service, talentbridge.io/domain: time }
    spec:
      serviceAccountName: overtime-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: overtime-service
          image: harbor.talentbridge.internal/talentbridge/overtime-service:latest
          ports: [{ containerPort: 50123, name: http }]
          envFrom: [{ configMapRef: { name: overtime-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50123 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50123 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
