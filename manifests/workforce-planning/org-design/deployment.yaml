apiVersion: apps/v1
kind: Deployment
metadata:
  name: org-design
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: org-design
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: workforce-planning
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: org-design } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: org-design, talentbridge.io/domain: workforce-planning }
    spec:
      serviceAccountName: org-design
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: org-design
          image: harbor.talentbridge.internal/talentbridge/org-design:latest
          ports: [{ containerPort: 50203, name: http }]
          envFrom: [{ configMapRef: { name: org-design } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50203 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50203 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
