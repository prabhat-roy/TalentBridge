apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-integration
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: erp-integration
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: integrations
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: erp-integration } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: erp-integration, talentbridge.io/domain: integrations }
    spec:
      serviceAccountName: erp-integration
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: erp-integration
          image: harbor.talentbridge.internal/talentbridge/erp-integration:latest
          ports: [{ containerPort: 50320, name: http }]
          envFrom: [{ configMapRef: { name: erp-integration } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50320 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50320 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
