apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-provisioning
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: identity-provisioning
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: integrations
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: identity-provisioning } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: identity-provisioning, talentbridge.io/domain: integrations }
    spec:
      serviceAccountName: identity-provisioning
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: identity-provisioning
          image: harbor.talentbridge.internal/talentbridge/identity-provisioning:latest
          ports: [{ containerPort: 50322, name: http }]
          envFrom: [{ configMapRef: { name: identity-provisioning } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50322 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50322 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
