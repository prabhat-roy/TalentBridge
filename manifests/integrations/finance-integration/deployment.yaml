apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-integration
  namespace: talentbridge
  labels:
    app.kubernetes.io/name: finance-integration
    app.kubernetes.io/part-of: talentbridge
    talentbridge.io/domain: integrations
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: finance-integration } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: finance-integration, talentbridge.io/domain: integrations }
    spec:
      serviceAccountName: finance-integration
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: finance-integration
          image: harbor.talentbridge.internal/talentbridge/finance-integration:latest
          ports: [{ containerPort: 50321, name: http }]
          envFrom: [{ configMapRef: { name: finance-integration } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50321 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50321 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
