apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata: { name: talentbridge-platform, namespace: talentbridge }
spec:
  interval: 5m
  chart:
    spec:
      chart: helm/charts/api-gateway
      sourceRef: { kind: GitRepository, name: talentbridge, namespace: flux-system }
  valuesFrom:
    - kind: ConfigMap
      name: talentbridge-cloud-overlay
      valuesKey: cloud-values.yaml
