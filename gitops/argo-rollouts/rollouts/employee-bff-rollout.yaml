apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: employee-bff, namespace: talentbridge }
spec:
  replicas: 3
  strategy: { canary: { steps: [{ setWeight: 10 }, { pause: { duration: 5m } }, { setWeight: 50 }, { pause: { duration: 5m } }, { setWeight: 100 }] } }
  selector: { matchLabels: { app.kubernetes.io/name: employee-bff } }
  template:
    metadata: { labels: { app.kubernetes.io/name: employee-bff } }
    spec:
      containers: [{ name: employee-bff, image: harbor.talentbridge.internal/talentbridge/employee-bff, ports: [{ containerPort: 50001 }] }]
