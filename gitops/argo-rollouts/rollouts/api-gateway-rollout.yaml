apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: api-gateway, namespace: talentbridge }
spec:
  replicas: 3
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - analysis: { templates: [{ templateName: talentbridge-canary-analysis }], args: [{ name: service-name, value: api-gateway }] }
        - setWeight: 25
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  selector: { matchLabels: { app.kubernetes.io/name: api-gateway } }
  template:
    metadata: { labels: { app.kubernetes.io/name: api-gateway } }
    spec:
      containers:
        - { name: api-gateway, image: harbor.talentbridge.internal/talentbridge/api-gateway, ports: [{ containerPort: 50000 }] }
