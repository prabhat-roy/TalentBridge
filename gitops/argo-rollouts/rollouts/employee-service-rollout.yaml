apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: employee-service, namespace: talentbridge }
spec:
  replicas: 3
  strategy: { canary: { steps: [{ setWeight: 10 }, { pause: { duration: 5m } }, { setWeight: 50 }, { pause: { duration: 5m } }, { setWeight: 100 }] } }
  selector: { matchLabels: { app.kubernetes.io/name: employee-service } }
  template:
    metadata: { labels: { app.kubernetes.io/name: employee-service, talentbridge.io/data-class: employee-pii } }
    spec:
      containers: [{ name: employee-service, image: harbor.talentbridge.internal/talentbridge/employee-service, ports: [{ containerPort: 50200 }] }]
