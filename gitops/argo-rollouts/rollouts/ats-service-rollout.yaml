apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: ats-service, namespace: talentbridge }
spec:
  replicas: 3
  strategy: { canary: { steps: [{ setWeight: 10 }, { pause: { duration: 5m } }, { setWeight: 25 }, { pause: { duration: 5m } }, { setWeight: 50 }, { pause: { duration: 5m } }, { setWeight: 100 }] } }
  selector: { matchLabels: { app.kubernetes.io/name: ats-service } }
  template:
    metadata: { labels: { app.kubernetes.io/name: ats-service } }
    spec:
      containers: [{ name: ats-service, image: harbor.talentbridge.internal/talentbridge/ats-service, ports: [{ containerPort: 50301 }] }]
