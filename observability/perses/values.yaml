# Perses — GitOps-native dashboards-as-code (Grafana alternative for version-controlled dashboards)
image: { repository: persesdev/perses, tag: latest }
perses:
  config:
    database: { file: { folder: /perses, extension: json } }
    schemas: { panels_path: /etc/perses/cue/panels, queries_path: /etc/perses/cue/queries }
ingress: { enabled: true, hosts: [{ host: perses.talentbridge.internal }] }
