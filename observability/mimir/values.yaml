# Grafana Mimir — horizontally-scalable long-term Prometheus storage
image: { repository: grafana/mimir, tag: 2.13.0 }
mimir:
  structuredConfig:
    common: { storage: { backend: s3, s3: { endpoint: minio.talentbridge.svc:9000, bucket_name: mimir-blocks, access_key_id: __MINIO_ACCESS__, secret_access_key: __MINIO_SECRET__ } } }
ingester: { replicas: 3 }
distributor: { replicas: 2 }
querier: { replicas: 2 }
