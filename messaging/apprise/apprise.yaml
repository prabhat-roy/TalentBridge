apiVersion: apps/v1
kind: Deployment
metadata: { name: apprise, namespace: talentbridge-comms }
spec:
  replicas: 1
  selector: { matchLabels: { app: apprise } }
  template:
    metadata: { labels: { app: apprise } }
    spec:
      containers:
        - name: apprise
          image: caronc/apprise:latest
          ports: [{ containerPort: 8000 }]
