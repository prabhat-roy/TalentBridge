stages: [build, scan, sign, push]
variables:
  REGISTRY: harbor.talentbridge.internal
  COSIGN_EXPERIMENTAL: '1'

.kaniko_build:
  stage: build
  image: gcr.io/kaniko-project/executor:debug
  script:
    - >-
      /kaniko/executor
      --context "$CI_PROJECT_DIR/$SERVICE_DIR"
      --dockerfile "$CI_PROJECT_DIR/$SERVICE_DIR/Dockerfile"
      --destination "${REGISTRY}/talentbridge/${SERVICE_NAME}:${CI_COMMIT_SHA}"
      --cache=true

.trivy_scan:
  stage: scan
  image: aquasec/trivy:latest
  script:
    - trivy image --exit-code 1 --severity CRITICAL,HIGH "${REGISTRY}/talentbridge/${SERVICE_NAME}:${CI_COMMIT_SHA}"

.syft_sbom:
  stage: scan
  image: anchore/syft:latest
  script:
    - syft "${REGISTRY}/talentbridge/${SERVICE_NAME}:${CI_COMMIT_SHA}" -o cyclonedx-json > sbom.json
  artifacts: { paths: [sbom.json] }

.cosign_sign:
  stage: sign
  image: gcr.io/projectsigstore/cosign:latest
  script:
    - cosign sign --yes "${REGISTRY}/talentbridge/${SERVICE_NAME}:${CI_COMMIT_SHA}"

# Per-service jobs are generated dynamically. Example: payroll-service.
payroll-service:
  variables: { SERVICE_DIR: src/payroll/payroll-service, SERVICE_NAME: payroll-service }
  extends: [.kaniko_build, .trivy_scan, .syft_sbom, .cosign_sign]
