apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: { name: talentbridge-vault-issuer }
spec:
  vault:
    server: https://vault.talentbridge.internal
    path: pki/sign/talentbridge-mesh
    auth:
      kubernetes:
        role: cert-manager
        mountPath: /v1/auth/kubernetes
        secretRef: { name: cert-manager-vault-token, key: token }
