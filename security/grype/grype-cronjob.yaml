apiVersion: batch/v1
kind: CronJob
metadata: { name: grype-scan, namespace: talentbridge-security }
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: grype
              image: anchore/grype:latest
              args: ["registry:harbor.talentbridge.internal/talentbridge","-o","json"]
