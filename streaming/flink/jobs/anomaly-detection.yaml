apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: talentbridge-anomaly-detection, namespace: talentbridge }
spec:
  deploymentName: talentbridge-flink
  job:
    jarURI: s3://talentbridge-flink-jobs/anomaly-detection.jar
    parallelism: 6
    upgradeMode: savepoint
    args: ["--source-topic", "talentbridge.metrics.raw", "--sink-topic", "talentbridge.alerts.anomaly"]
