apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata: { name: talentbridge-flink, namespace: talentbridge }
spec:
  image: flink:1.20-scala_2.12-java17
  flinkVersion: v1_20
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "4"
    state.backend: rocksdb
    state.backend.incremental: "true"
    state.checkpoints.dir: s3://talentbridge-checkpoints/
    high-availability: kubernetes
  serviceAccount: flink
  jobManager: { resource: { memory: "2048m", cpu: 1 } }
  taskManager: { resource: { memory: "4096m", cpu: 2 }, replicas: 3 }
