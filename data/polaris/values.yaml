# Apache Polaris — Iceberg REST catalog with RBAC + multi-engine support
image: { repository: apache/polaris, tag: latest }
polaris:
  realm: talentbridge
  storage:
    s3: { endpoint: http://minio.talentbridge.svc:9000, region: us-east-1, bucket: talentbridge-iceberg-warehouse }
ingress: { enabled: true, hosts: [{ host: polaris.talentbridge.internal }] }
