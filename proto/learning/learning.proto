syntax = "proto3";

package talentbridge.learning.v1;

option go_package = "github.com/prabhat-roy/TalentBridge/proto/learning/v1;learning_v1";
option java_multiple_files = true;
option java_package = "com.talentbridge.learning.v1";

import "common/types.proto";
import "google/protobuf/timestamp.proto";

// learning service for TalentBridge
service LearningService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message Learning {
  string id = 1;
  string tenant_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  map<string, string> attributes = 5;
}

message GetRequest    { string id = 1; }
message GetResponse   { Learning entity = 1; }
message ListRequest   { string tenant_id = 1; common.Pagination page = 2; }
message ListResponse  { repeated Learning items = 1; common.Pagination page = 2; }
message CreateRequest { Learning entity = 1; }
message CreateResponse{ Learning entity = 1; }
message UpdateRequest { Learning entity = 1; }
message UpdateResponse{ Learning entity = 1; }
message DeleteRequest { string id = 1; }
message DeleteResponse{ bool ok = 1; }
