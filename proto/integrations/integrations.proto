syntax = "proto3";

package talentbridge.integrations.v1;

option go_package = "github.com/prabhat-roy/TalentBridge/proto/integrations/v1;integrations_v1";
option java_multiple_files = true;
option java_package = "com.talentbridge.integrations.v1";

import "common/types.proto";
import "google/protobuf/timestamp.proto";

// integrations service for TalentBridge
service IntegrationsService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message Integrations {
  string id = 1;
  string tenant_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  map<string, string> attributes = 5;
}

message GetRequest    { string id = 1; }
message GetResponse   { Integrations entity = 1; }
message ListRequest   { string tenant_id = 1; common.Pagination page = 2; }
message ListResponse  { repeated Integrations items = 1; common.Pagination page = 2; }
message CreateRequest { Integrations entity = 1; }
message CreateResponse{ Integrations entity = 1; }
message UpdateRequest { Integrations entity = 1; }
message UpdateResponse{ Integrations entity = 1; }
message DeleteRequest { string id = 1; }
message DeleteResponse{ bool ok = 1; }
