version: v2
managed: { enabled: true }
plugins:
  - { remote: buf.build/protocolbuffers/go,    out: ../src/gen/go,    opt: paths=source_relative }
  - { remote: buf.build/grpc/go,               out: ../src/gen/go,    opt: paths=source_relative }
  - { remote: buf.build/protocolbuffers/java,  out: ../src/gen/java }
  - { remote: buf.build/grpc/java,             out: ../src/gen/java }
  - { remote: buf.build/protocolbuffers/python,out: ../src/gen/python }
  - { remote: buf.build/grpc/python,           out: ../src/gen/python }
