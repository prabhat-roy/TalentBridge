syntax = "proto3";

package talentbridge.recruitment.v1;

option go_package = "github.com/prabhat-roy/TalentBridge/proto/recruitment/v1;recruitment_v1";
option java_multiple_files = true;
option java_package = "com.talentbridge.recruitment.v1";

import "common/types.proto";
import "google/protobuf/timestamp.proto";

// recruitment service for TalentBridge
service RecruitmentService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message Recruitment {
  string id = 1;
  string tenant_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  map<string, string> attributes = 5;
}

message GetRequest    { string id = 1; }
message GetResponse   { Recruitment entity = 1; }
message ListRequest   { string tenant_id = 1; common.Pagination page = 2; }
message ListResponse  { repeated Recruitment items = 1; common.Pagination page = 2; }
message CreateRequest { Recruitment entity = 1; }
message CreateResponse{ Recruitment entity = 1; }
message UpdateRequest { Recruitment entity = 1; }
message UpdateResponse{ Recruitment entity = 1; }
message DeleteRequest { string id = 1; }
message DeleteResponse{ bool ok = 1; }
