syntax = "proto3";
package talentbridge.recruitment.v1;
option go_package = "github.com/prabhat-roy/TalentBridge/proto/recruitment/v1;recruitment_v1";
import "google/protobuf/timestamp.proto";

message RecruitmentCreatedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
message RecruitmentUpdatedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
message RecruitmentDeletedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
