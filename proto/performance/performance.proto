syntax = "proto3";

package talentbridge.performance.v1;

option go_package = "github.com/prabhat-roy/TalentBridge/proto/performance/v1;performance_v1";
option java_multiple_files = true;
option java_package = "com.talentbridge.performance.v1";

import "common/types.proto";
import "google/protobuf/timestamp.proto";

// performance service for TalentBridge
service PerformanceService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message Performance {
  string id = 1;
  string tenant_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  map<string, string> attributes = 5;
}

message GetRequest    { string id = 1; }
message GetResponse   { Performance entity = 1; }
message ListRequest   { string tenant_id = 1; common.Pagination page = 2; }
message ListResponse  { repeated Performance items = 1; common.Pagination page = 2; }
message CreateRequest { Performance entity = 1; }
message CreateResponse{ Performance entity = 1; }
message UpdateRequest { Performance entity = 1; }
message UpdateResponse{ Performance entity = 1; }
message DeleteRequest { string id = 1; }
message DeleteResponse{ bool ok = 1; }
