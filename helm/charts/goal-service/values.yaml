image: { repository: talentbridge/goal-service, tag: "", pullPolicy: IfNotPresent }
replicaCount: 2
domain: performance
service: { type: ClusterIP, port: 50700, targetPort: 50700 }
resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 1000m, memory: 512Mi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 50700 }, initialDelaySeconds: 15, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 50700 }, initialDelaySeconds: 5,  periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: goal-service, app.kubernetes.io/part-of: talentbridge, talentbridge.io/domain: performance }
podAnnotations: {}
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info }
region: ""
dataResidencyClass: regional
cloud: { provider: "", storageClass: "", ingressClass: "" }
