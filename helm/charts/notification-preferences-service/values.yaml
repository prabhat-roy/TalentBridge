image:
  repository: talentbridge/notification-preferences-service
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 51005
  targetPort: 51005

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 1000m, memory: 512Mi }

probes:
  liveness:
    httpGet: { path: /healthz, port: 51005 }
    initialDelaySeconds: 15
  readiness:
    httpGet: { path: /healthz, port: 51005 }
    initialDelaySeconds: 5

serviceAccount: { create: true, annotations: {} }

podLabels:
  app.kubernetes.io/name: notification-preferences-service
  app.kubernetes.io/part-of: talentbridge
  talentbridge.io/domain: platform

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile: { type: RuntimeDefault }

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities: { drop: ["ALL"] }

config:
  LOG_LEVEL: info

cloud:
  provider: ""
  storageClass: ""
  ingressClass: ""
