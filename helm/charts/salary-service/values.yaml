image: { repository: talentbridge/salary-service, tag: "", pullPolicy: IfNotPresent }
replicaCount: 3
domain: payroll
service: { type: ClusterIP, port: 50501, targetPort: 50501 }
resources: { requests: { cpu: 200m, memory: 512Mi }, limits: { cpu: 2000m, memory: 2Gi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 50501 }, initialDelaySeconds: 15, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 50501 }, initialDelaySeconds: 5,  periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: salary-service, app.kubernetes.io/part-of: talentbridge, talentbridge.io/domain: payroll, talentbridge.io/data-class: payroll-pii }
podAnnotations: {}
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: [{ name: MONEY_TYPE, value: BigDecimal }]
envFrom: []
config: { LOG_LEVEL: info }
region: ""
dataResidencyClass: pii-regional-strict
cloud: { provider: "", storageClass: "", ingressClass: "" }
