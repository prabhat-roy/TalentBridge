image: { repository: talentbridge/attendance-service, tag: "", pullPolicy: IfNotPresent }
replicaCount: 3
domain: time
service: { type: ClusterIP, port: 50600, targetPort: 50600 }
resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1500m, memory: 768Mi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 50600 }, initialDelaySeconds: 15, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 50600 }, initialDelaySeconds: 5,  periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: attendance-service, app.kubernetes.io/part-of: talentbridge, talentbridge.io/domain: time }
podAnnotations: {}
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info }
region: ""
dataResidencyClass: regional
cloud: { provider: "", storageClass: "", ingressClass: "" }
