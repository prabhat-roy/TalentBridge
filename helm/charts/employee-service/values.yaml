image: { repository: talentbridge/employee-service, tag: "", pullPolicy: IfNotPresent }
replicaCount: 3
domain: core-hr
service: { type: ClusterIP, port: 50200, targetPort: 50200 }
resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1500m, memory: 768Mi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 50200 }, initialDelaySeconds: 15, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 50200 }, initialDelaySeconds: 5,  periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: employee-service, app.kubernetes.io/part-of: talentbridge, talentbridge.io/domain: core-hr, talentbridge.io/data-class: employee-pii }
podAnnotations: {}
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info }
region: ""
dataResidencyClass: pii-regional-strict
cloud: { provider: "", storageClass: "", ingressClass: "" }
