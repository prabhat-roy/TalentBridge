# Cloud-agnostic defaults for api-gateway.
# Overlay with values-{aws|gcp|azure}.yaml for cloud-specific settings.

image:
  repository: talentbridge/api-gateway
  tag: ""        # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

replicaCount: 3

service:
  type: ClusterIP
  port: 50000
  targetPort: 50000

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 1Gi

probes:
  liveness:
    httpGet:
      path: /healthz
      port: 50000
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    httpGet:
      path: /healthz
      port: 50000
    initialDelaySeconds: 5
    periodSeconds: 10

serviceAccount:
  create: true
  annotations: {}

podLabels:
  app.kubernetes.io/name: api-gateway
  app.kubernetes.io/part-of: talentbridge
  talentbridge.io/domain: platform
  talentbridge.io/owner-team: platform
  talentbridge.io/data-class: non-pii

podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

env: []
envFrom: []

config:
  LOG_LEVEL: info

# Multi-region data residency: each cluster runs in a region and only routes to in-region BFFs.
region: ""           # eu-west-1 | ap-south-1 | us-east-1 | etc.
dataResidencyClass: regional

cloud:
  provider: ""
  storageClass: ""
  ingressClass: ""
