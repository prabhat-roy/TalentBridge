image: { repository: talentbridge/ats-service, tag: "", pullPolicy: IfNotPresent }
replicaCount: 3
domain: recruitment
service: { type: ClusterIP, port: 50301, targetPort: 50301 }
resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1500m, memory: 768Mi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 50301 }, initialDelaySeconds: 15, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 50301 }, initialDelaySeconds: 5,  periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: ats-service, app.kubernetes.io/part-of: talentbridge, talentbridge.io/domain: recruitment }
podAnnotations: {}
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info }
region: ""
dataResidencyClass: regional
cloud: { provider: "", storageClass: "", ingressClass: "" }
