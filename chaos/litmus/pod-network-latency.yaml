apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata: { name: talentbridge-pod-network-latency, namespace: litmus }
spec:
  appinfo: { appns: talentbridge, applabel: "tier=api", appkind: deployment }
  chaosServiceAccount: litmus-admin
  experiments:
    - { name: pod-network-latency, spec: { components: { env: [ { name: NETWORK_LATENCY, value: "200" }, { name: TOTAL_CHAOS_DURATION, value: "60" } ] } } }
