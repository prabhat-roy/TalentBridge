---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: talentbridge-service-reader }
rules:
  - { apiGroups: [""],     resources: [pods, services, configmaps], verbs: [get, list, watch] }
  - { apiGroups: ["apps"], resources: [deployments, statefulsets],  verbs: [get, list, watch] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: talentbridge-platform-admin }
rules:
  - { apiGroups: ["*"], resources: ["*"], verbs: ["*"] }
---
# Payroll admin role — only allowed to operate payroll-namespace resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: talentbridge-payroll-admin, namespace: talentbridge-payroll }
rules:
  - { apiGroups: ["*"], resources: ["*"], verbs: ["*"] }
