apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata: { name: notification-orchestrator, namespace: talentbridge }
spec:
  scaleTargetRef: { name: notification-orchestrator }
  minReplicaCount: 2
  maxReplicaCount: 30
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka.messaging:9092
        consumerGroup: notification-orchestrator
        topic: notifications.notification.dispatched
        lagThreshold: "100"
