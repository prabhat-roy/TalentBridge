---
apiVersion: v1
kind: ResourceQuota
metadata: { name: talentbridge-quota, namespace: talentbridge }
spec:
  hard:
    requests.cpu: "100"
    requests.memory: 200Gi
    limits.cpu: "200"
    limits.memory: 400Gi
    pods: "500"
    persistentvolumeclaims: "50"
---
apiVersion: v1
kind: ResourceQuota
metadata: { name: talentbridge-payroll-quota, namespace: talentbridge-payroll }
spec:
  hard: { requests.cpu: "40", requests.memory: 80Gi, limits.cpu: "80", limits.memory: 160Gi, pods: "100" }
---
apiVersion: v1
kind: LimitRange
metadata: { name: talentbridge-limits, namespace: talentbridge }
spec:
  limits:
    - type: Container
      default:        { cpu: 500m, memory: 512Mi }
      defaultRequest: { cpu: 50m,  memory: 64Mi }
      max:            { cpu: 4,    memory: 4Gi }
